services:
  tooldb:
    image: ghcr.io/paradosi/tooldb-selfhosted:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_TYPE=sqlite
      # - AUTH_ENABLED=true
      # - AUTH_USERNAME=admin
      # - AUTH_PASSWORD=changeme
    restart: unless-stopped

